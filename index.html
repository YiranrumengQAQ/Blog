<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫猫的回忆</title>
    <meta name="description" content="猫猫的回忆 - 记录温暖时光的静态博客">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
    </script>
    <style>
        :root {
            --bg-primary: #faf8f5;
            --bg-secondary: #f3efe9;
            --bg-card: #ffffff;
            --bg-card-hover: #fefcf9;
            --bg-sidebar: #f5f1eb;
            --bg-code: #f4f0ea;
            --bg-input: #ffffff;
            --bg-overlay: rgba(0, 0, 0, 0.04);
            --text-primary: #3d3530;
            --text-secondary: #6b5e55;
            --text-muted: #9a8c82;
            --text-link: #c17d5a;
            --text-link-hover: #a05a3d;
            --accent: #d4946a;
            --accent-soft: #f0d9c8;
            --accent-glow: rgba(212, 148, 106, 0.18);
            --border: #e5ddd4;
            --border-light: #f0ebe3;
            --shadow-sm: 0 1px 3px rgba(60, 40, 25, 0.06);
            --shadow-md: 0 4px 16px rgba(60, 40, 25, 0.08);
            --shadow-lg: 0 12px 40px rgba(60, 40, 25, 0.12);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Menlo', monospace;
            --font-serif: 'Georgia', 'Noto Serif SC', 'STSong', 'Songti SC', serif;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
            --sticky-badge-bg: #fdf0e6;
            --sticky-badge-text: #c17d5a;
            --tag-bg: #faf4ee;
            --tag-text: #8b6b55;
            --tag-hover-bg: #f0d9c8;
            --scrollbar-thumb: #d5c8ba;
            --scrollbar-track: #f5f1eb;
            --code-comment: #9a8c82;
            --code-keyword: #b5653e;
            --code-string: #6b8e5a;
            --code-number: #c17d5a;
            --code-function: #7b6b8a;
        }

        [data-theme="dark"] {
            --bg-primary: #1c1a18;
            --bg-secondary: #22201d;
            --bg-card: #282522;
            --bg-card-hover: #2d2a26;
            --bg-sidebar: #201e1b;
            --bg-code: #252220;
            --bg-input: #2a2724;
            --bg-overlay: rgba(255, 255, 255, 0.03);
            --text-primary: #e8e0d8;
            --text-secondary: #b8a99c;
            --text-muted: #7d7066;
            --text-link: #e0a87a;
            --text-link-hover: #f0c098;
            --accent: #d4946a;
            --accent-soft: #3d2a1f;
            --accent-glow: rgba(212, 148, 106, 0.14);
            --border: #38332e;
            --border-light: #2d2925;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
            --sticky-badge-bg: #3d2a1f;
            --sticky-badge-text: #e0a87a;
            --tag-bg: #2d2620;
            --tag-text: #b8957a;
            --tag-hover-bg: #3d2a1f;
            --scrollbar-thumb: #4a3f36;
            --scrollbar-track: #22201d;
            --code-comment: #7d7066;
            --code-keyword: #d4946a;
            --code-string: #8aaa7a;
            --code-number: #e0a87a;
            --code-function: #9b8aaa;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
            transition: background var(--transition-smooth), color var(--transition-smooth);
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 7px;
            height: 7px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Selection */
        ::selection {
            background: var(--accent-soft);
            color: var(--text-primary);
        }

        /* ============ HEADER ============ */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-light);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all var(--transition-smooth);
            padding: 0 1.5rem;
        }
        .site-header.scrolled {
            box-shadow: var(--shadow-sm);
            border-bottom-color: var(--border);
        }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            gap: 1rem;
        }
        .blog-name {
            font-family: var(--font-serif);
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.02em;
            white-space: nowrap;
            cursor: pointer;
            transition: color var(--transition-fast);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            user-select: none;
        }
        .blog-name:hover {
            color: var(--accent);
        }
        .blog-name .paw-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.7;
            animation: pawPulse 2.5s ease-in-out infinite;
        }
        .blog-name .paw-dot:nth-child(2) {
            animation-delay: 0.6s;
        }
        .blog-name .paw-dot:nth-child(3) {
            animation-delay: 1.2s;
        }
        @keyframes pawPulse {
            0%,
            100% {
                opacity: 0.4;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-shrink: 0;
        }
        .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-input {
            width: 220px;
            height: 38px;
            border: 1.5px solid var(--border);
            border-radius: 50px;
            padding: 0 2.5rem 0 1rem;
            font-size: 0.9rem;
            font-family: var(--font-sans);
            background: var(--bg-input);
            color: var(--text-primary);
            transition: all var(--transition-fast);
            outline: none;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
            width: 260px;
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }
        .search-icon {
            position: absolute;
            right: 12px;
            pointer-events: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            transition: color var(--transition-fast);
        }
        .search-input:focus~.search-icon {
            color: var(--accent);
        }
        .search-clear {
            position: absolute;
            right: 32px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 2px 4px;
            border-radius: 50%;
            display: none;
            line-height: 1;
            transition: color var(--transition-fast);
        }
        .search-clear.visible {
            display: block;
        }
        .search-clear:hover {
            color: var(--text-primary);
        }

        /* Theme toggle */
        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--bg-input);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .theme-toggle:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }
        .theme-toggle svg {
            width: 18px;
            height: 18px;
            transition: transform var(--transition-spring), opacity var(--transition-fast);
            fill: none;
            stroke: var(--text-secondary);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .theme-toggle .sun-icon {
            position: absolute;
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }
        .theme-toggle .moon-icon {
            opacity: 0;
            transform: rotate(-90deg) scale(0.5);
        }
        [data-theme="dark"] .theme-toggle .sun-icon {
            opacity: 0;
            transform: rotate(90deg) scale(0.5);
        }
        [data-theme="dark"] .theme-toggle .moon-icon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        /* Mobile menu button */
        .mobile-menu-btn {
            display: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--bg-input);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            flex-direction: column;
            gap: 4px;
            padding: 0;
        }
        .mobile-menu-btn span {
            display: block;
            width: 16px;
            height: 1.5px;
            border-radius: 2px;
            background: var(--text-secondary);
            transition: all var(--transition-smooth);
        }
        .mobile-menu-btn.active span:nth-child(1) {
            transform: rotate(45deg) translate(3.5px, 3.5px);
        }
        .mobile-menu-btn.active span:nth-child(2) {
            opacity: 0;
        }
        .mobile-menu-btn.active span:nth-child(3) {
            transform: rotate(-45deg) translate(3.5px, -3.5px);
        }

        /* ============ LAYOUT ============ */
        .main-container {
            max-width: 1280px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 2rem;
            padding: 1.5rem 1.5rem 3rem;
            min-height: calc(100vh - 60px - 80px);
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            position: sticky;
            top: 80px;
            align-self: start;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            padding-right: 0.5rem;
            transition: all var(--transition-smooth);
        }
        .sidebar-section {
            background: var(--bg-sidebar);
            border-radius: var(--radius-md);
            padding: 1.2rem;
            border: 1px solid var(--border-light);
            transition: all var(--transition-smooth);
        }
        .sidebar-section h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            font-weight: 600;
        }
        .sidebar-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .sidebar-tag {
            font-size: 0.78rem;
            padding: 0.3rem 0.7rem;
            border-radius: 50px;
            background: var(--tag-bg);
            color: var(--tag-text);
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1px solid transparent;
            white-space: nowrap;
            text-decoration: none;
            user-select: none;
        }
        .sidebar-tag:hover,
        .sidebar-tag.active {
            background: var(--tag-hover-bg);
            border-color: var(--accent);
            color: var(--accent);
        }
        .sidebar-tag .count {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-left: 0.15rem;
        }
        .sidebar-cat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.45rem 0.6rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: 0.9rem;
            color: var(--text-secondary);
            border: 1px solid transparent;
            user-select: none;
        }
        .sidebar-cat-item:hover,
        .sidebar-cat-item.active {
            background: var(--bg-card);
            border-color: var(--border);
            color: var(--text-primary);
        }
        .sidebar-cat-item .count {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 0.15rem 0.5rem;
            border-radius: 50px;
        }
        .sidebar-archive-item {
            display: block;
            padding: 0.4rem 0.6rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            border: 1px solid transparent;
            user-select: none;
            text-decoration: none;
        }
        .sidebar-archive-item:hover,
        .sidebar-archive-item.active {
            background: var(--bg-card);
            border-color: var(--border);
            color: var(--text-primary);
        }
        .sidebar-archive-item .count {
            float: right;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .sidebar-reset {
            display: inline-block;
            font-size: 0.78rem;
            color: var(--text-link);
            cursor: pointer;
            padding: 0.35rem 0.8rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: transparent;
            transition: all var(--transition-fast);
            text-align: center;
            user-select: none;
            margin-top: 0.3rem;
        }
        .sidebar-reset:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
        }

        /* ============ CONTENT AREA ============ */
        .content-area {
            min-width: 0;
        }
        .content-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }
        .content-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.01em;
        }
        .result-count {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ============ POST CARDS ============ */
        .posts-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .post-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition-smooth);
            display: grid;
            grid-template-columns: 200px 1fr;
            position: relative;
            text-decoration: none;
            color: inherit;
        }
        .post-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--border);
            transform: translateY(-2px);
            background: var(--bg-card-hover);
        }
        .post-card:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sm);
        }
        .post-card.sticky-post {
            border-left: 3px solid var(--accent);
        }
        .card-cover {
            width: 200px;
            height: 100%;
            min-height: 150px;
            background: var(--bg-secondary);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-smooth);
        }
        .post-card:hover .card-cover img {
            transform: scale(1.04);
        }
        .card-cover-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--accent-soft) 100%);
            color: var(--text-muted);
            font-size: 2.5rem;
            font-family: var(--font-serif);
            opacity: 0.5;
            letter-spacing: 0.05em;
        }
        .card-body {
            padding: 1.2rem 1.4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.5rem;
            min-width: 0;
        }
        .card-meta-top {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        .card-sticky-badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.55rem;
            border-radius: 50px;
            background: var(--sticky-badge-bg);
            color: var(--sticky-badge-text);
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .card-category {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 500;
        }
        .card-title {
            font-size: 1.15rem;
            font-weight: 650;
            line-height: 1.35;
            color: var(--text-primary);
            letter-spacing: 0.01em;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-summary {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
        }
        .card-tag {
            font-size: 0.72rem;
            padding: 0.2rem 0.5rem;
            border-radius: 50px;
            background: var(--tag-bg);
            color: var(--tag-text);
            transition: all var(--transition-fast);
        }
        .card-footer-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .reading-time-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--text-muted);
            opacity: 0.5;
        }

        /* ============ PAGINATION ============ */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .page-btn {
            min-width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--bg-card);
            cursor: pointer;
            font-size: 0.85rem;
            font-family: var(--font-sans);
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            font-weight: 500;
        }
        .page-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--bg-card-hover);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }
        .page-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 600;
            pointer-events: none;
        }
        .page-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }
        .page-ellipsis {
            width: 38px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            user-select: none;
        }

        /* ============ ARTICLE DETAIL ============ */
        .article-view {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            padding: 2.5rem 2.5rem;
            max-width: 820px;
            margin: 0 auto;
            transition: all var(--transition-smooth);
        }
        .article-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.88rem;
            color: var(--text-link);
            cursor: pointer;
            margin-bottom: 1.5rem;
            padding: 0.4rem 0.8rem;
            border-radius: 50px;
            border: 1px solid transparent;
            transition: all var(--transition-fast);
            user-select: none;
            background: none;
            font-family: var(--font-sans);
        }
        .article-back:hover {
            border-color: var(--border);
            background: var(--bg-card-hover);
        }
        .article-back-arrow {
            display: inline-block;
            transition: transform var(--transition-fast);
        }
        .article-back:hover .article-back-arrow {
            transform: translateX(-3px);
        }
        .article-cover-full {
            width: 100%;
            max-height: 420px;
            object-fit: cover;
            border-radius: var(--radius-md);
            margin-bottom: 1.8rem;
            background: var(--bg-secondary);
        }
        .article-title {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-primary);
            margin-bottom: 1rem;
            letter-spacing: 0.01em;
        }
        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
            margin-bottom: 1.8rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .article-meta .meta-sep {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--text-muted);
            opacity: 0.5;
        }
        .article-content {
            font-size: 1rem;
            line-height: 1.85;
            color: var(--text-primary);
            word-break: break-word;
        }
        .article-content h1,
        .article-content h2,
        .article-content h3,
        .article-content h4,
        .article-content h5,
        .article-content h6 {
            margin-top: 2rem;
            margin-bottom: 0.8rem;
            font-weight: 650;
            line-height: 1.3;
            letter-spacing: 0.01em;
            color: var(--text-primary);
        }
        .article-content h1 {
            font-size: 1.6rem;
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 0.5rem;
        }
        .article-content h2 {
            font-size: 1.35rem;
        }
        .article-content h3 {
            font-size: 1.15rem;
        }
        .article-content p {
            margin-bottom: 1rem;
        }
        .article-content a {
            color: var(--text-link);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-thickness: 1px;
            transition: all var(--transition-fast);
        }
        .article-content a:hover {
            color: var(--text-link-hover);
            text-decoration-thickness: 2px;
        }
        .article-content img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius-md);
            margin: 1.2rem 0;
            display: block;
            box-shadow: var(--shadow-sm);
        }
        .article-content blockquote {
            border-left: 3px solid var(--accent);
            padding: 0.8rem 1.2rem;
            margin: 1.2rem 0;
            background: var(--bg-overlay);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .article-content code {
            font-family: var(--font-mono);
            font-size: 0.88em;
            background: var(--bg-code);
            padding: 0.15em 0.4em;
            border-radius: 4px;
            color: var(--accent);
        }
        .article-content pre {
            background: var(--bg-code);
            border-radius: var(--radius-md);
            padding: 1.2rem 1.4rem;
            overflow-x: auto;
            margin: 1.2rem 0;
            border: 1px solid var(--border-light);
            font-size: 0.88rem;
            line-height: 1.6;
        }
        .article-content pre code {
            background: none;
            padding: 0;
            color: var(--text-primary);
            font-size: inherit;
        }
        .article-content ul,
        .article-content ol {
            margin: 0.8rem 0;
            padding-left: 1.5rem;
        }
        .article-content li {
            margin-bottom: 0.35rem;
        }
        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.2rem 0;
            font-size: 0.9rem;
        }
        .article-content th,
        .article-content td {
            border: 1px solid var(--border);
            padding: 0.6rem 0.9rem;
            text-align: left;
        }
        .article-content th {
            background: var(--bg-overlay);
            font-weight: 600;
        }
        .article-content hr {
            border: none;
            border-top: 1px solid var(--border-light);
            margin: 2rem 0;
        }
        .article-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-light);
        }
        .article-nav-item {
            padding: 0.8rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            color: inherit;
            background: var(--bg-card);
        }
        .article-nav-item:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-sm);
        }
        .article-nav-item.prev {
            text-align: left;
        }
        .article-nav-item.next {
            text-align: right;
            margin-left: auto;
        }
        .article-nav-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }
        .article-nav-title {
            font-size: 0.9rem;
            color: var(--text-primary);
            font-weight: 500;
        }
        .article-nav-item.empty {
            opacity: 0.4;
            pointer-events: none;
        }

        /* ============ EMPTY STATE ============ */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-muted);
        }
        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
            font-family: var(--font-serif);
        }
        .empty-state h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
        .empty-state p {
            font-size: 0.9rem;
        }

        /* ============ LOADING ============ */
        .loading-skeleton {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .skeleton-card {
            display: grid;
            grid-template-columns: 200px 1fr;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }
        .skeleton-cover {
            width: 200px;
            height: 150px;
            background: var(--bg-secondary);
            animation: shimmer 1.6s ease-in-out infinite;
        }
        .skeleton-body {
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .skeleton-line {
            height: 14px;
            border-radius: 7px;
            background: var(--bg-secondary);
            animation: shimmer 1.6s ease-in-out infinite;
        }
        .skeleton-line.short {
            width: 40%;
        }
        .skeleton-line.medium {
            width: 70%;
        }
        .skeleton-line.long {
            width: 90%;
        }
        @keyframes shimmer {
            0% {
                opacity: 0.5;
            }
            50% {
                opacity: 0.9;
            }
            100% {
                opacity: 0.5;
            }
        }

        /* ============ TOAST ============ */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            padding: 0.7rem 1.2rem;
            border-radius: 50px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 0.85rem;
            box-shadow: var(--shadow-md);
            animation: toastIn 0.4s cubic-bezier(0.22, 0.61, 0.36, 1), toastOut 0.35s cubic-bezier(0.4, 0, 0.2, 1) 2.5s forwards;
            max-width: 360px;
            text-align: center;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(-10px) scale(0.9);
            }
        }

        /* ============ BACK TO TOP ============ */
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--bg-card);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            transition: all var(--transition-smooth);
            opacity: 0;
            pointer-events: none;
            z-index: 90;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        .back-to-top.visible {

        .back-to-top:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-lg);
            transform: translateY(-3px);
            color: var(--accent);
        }

        /* ============ RESPONSIVE ============ */

                    <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-body"><div class="skeleton-line long"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></div>
                    <div class="skeleton-card"><div class="skeleton-cover"></div><div class="skeleton-body"><div class="skeleton-line long"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></div>

    <script>
        // ==================== BlogKernel 内核 ====================
        class BlogKernel {
            constructor(options = {}) {
                this.configUrl = options.configUrl || './config.json';
                this.manifestUrl = options.manifestUrl || './posts/manifest.json';
                this.postsDir = options.postsDir || './posts/';
                this.config = {};
                this.postsIndex = [];
                this.postsCache = new Map();
                this.categories = {};
                this.tags = {};
                this.archives = {};
                this.isInitialized = false;
                this.hooks = {
                    onProgress: options.onProgress || (() => {}),
                    onError: options.onError || (() => {})
                };
            }

            async init() {
                try {
                    const [configRes, manifestRes] = await Promise.all([
                        fetch(this.configUrl).then(res => { if (!res.ok) throw new Error(
                                'config.json 加载失败'); return res.json(); }),
                        fetch(this.manifestUrl).then(res => { if (!res.ok) throw new Error(
                                'manifest.json 加载失败'); return res.json(); })
                    ]);
                    this.config = configRes;
                    this.postsIndex = manifestRes.sort((a, b) => {
                        if (a.sticky !== b.sticky) return b.sticky ? 1 : -1;
                        return new Date(b.date) - new Date(a.date);
                    });
                    this._buildTaxonomies();
                    this.isInitialized = true;
                    return this;
                } catch (error) {
                    this.hooks.onError('内核初始化失败', error);
                    throw error;
                }
            }

            _buildTaxonomies() {
                this.categories = {};
                this.tags = {};
                this.archives = {};
                this.postsIndex.forEach(post => {
                    if (post.category) {
                        if (!this.categories[post.category]) this.categories[post.category] = [];
                        this.categories[post.category].push(post);
                    }
                    if (post.tags && Array.isArray(post.tags)) {
                        post.tags.forEach(tag => {
                            if (!this.tags[tag]) this.tags[tag] = [];
                            this.tags[tag].push(post);
                        });
                    }
                    if (post.date) {
                        const dateObj = new Date(post.date);
                        const year = dateObj.getFullYear();
                        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                        const archiveKey = `${year}年${month}月`;
                        if (!this.archives[archiveKey]) this.archives[archiveKey] = [];
                        this.archives[archiveKey].push(post);
                    }
                });
            }

            queryPosts(params = {}) {
                const { category = null, tag = null, archive = null, keyword = null, page = 1, perPage = this.config
                        .perPage || 5 } = params;
                let result = [...this.postsIndex];
                if (category) result = result.filter(post => post.category === category);
                if (tag) result = result.filter(post => post.tags && post.tags.includes(tag));
                if (archive) result = result.filter(post => {
                    const dateObj = new Date(post.date);
                    const k =
                        `${dateObj.getFullYear()}年${String(dateObj.getMonth() + 1).padStart(2, '0')}月`;
                    return k === archive;
                });
                if (keyword) {
                    const lowKey = keyword.toLowerCase();
                    result = result.filter(post => {
                        const matchTitle = post.title?.toLowerCase().includes(lowKey);
                        const matchSummary = post.summary?.toLowerCase().includes(lowKey);
                        const matchCategory = post.category?.toLowerCase().includes(lowKey);
                        const matchTags = post.tags?.some(t => t.toLowerCase().includes(lowKey));
                        return matchTitle || matchSummary || matchCategory || matchTags;
                    });
                }
                const totalItems = result.length;
                const totalPages = Math.ceil(totalItems / perPage);
                const start = (page - 1) * perPage;
                const end = start + perPage;
                const pageItems = result.slice(start, end);
                return {
                    items: pageItems,
                    pagination: { currentPage: page, perPage, totalItems, totalPages, hasNext: page <
                            totalPages, hasPrev: page > 1 }
                };
            }

            async getPostDetail(slug) {
                if (this.postsCache.has(slug)) return this.postsCache.get(slug);
                try {
                    const url = `${this.postsDir}${slug}.md`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`文章 ${slug}.md 未找到`);
                    const rawMarkdown = await response.text();
                    const parsedData = this._parseFrontMatter(rawMarkdown);
                    const basicInfo = this.postsIndex.find(p => p.slug === slug) || {};
                    const wordCount = parsedData.content.replace(/[\s\r\n]+/g, '').length;
                    const readingTime = Math.max(1, Math.ceil(wordCount / 350));
                    const coverMatch = parsedData.content.match(/!\[.*?\]\((.*?)\)/);
                    let coverImage = coverMatch ? coverMatch[1] : null;
                    if (coverImage && !coverImage.startsWith('http') && !coverImage.startsWith('//') && !
                        coverImage.startsWith('data:')) {
                        if (coverImage.startsWith('./')) coverImage = coverImage.slice(2);
                        coverImage = this.postsDir + coverImage;
                    }
                    const { prevPost, nextPost } = this._getAdjacentPosts(slug);
                    const fullPost = {
                        ...basicInfo,
                        ...parsedData.metadata,
                        content: parsedData.content,
                        wordCount,
                        readingTime,
                        coverImage,
                        prevPost,
                        nextPost
                    };
                    this.postsCache.set(slug, fullPost);
                    return fullPost;
                } catch (error) {
                    this.hooks.onError(`获取文章详情失败: ${slug}`, error);
                    throw error;
                }
            }

            _parseFrontMatter(rawText) {
                const result = { metadata: {}, content: rawText };
                const regex = /^---\r?\n([\s\S]*?)\r?\n---\r?\n/;
                const match = rawText.match(regex);
                if (match) {
                    result.content = rawText.replace(match[0], '');
                    const yamlBlock = match[1];
                    const lines = yamlBlock.split('\n');
                    lines.forEach(line => {
                        const parts = line.split(':');
                        if (parts.length >= 2) {
                            const key = parts[0].trim();
                            let value = parts.slice(1).join(':').trim();
                            if (value.startsWith('[') && value.endsWith(']')) {
                                value = value.slice(1, -1).split(',').map(s => s.trim());
                            } else if (value.includes(',')) {
                                value = value.split(',').map(s => s.trim());
                            }
                            if (typeof value === 'string') value = value.replace(/^['"]|['"]$/g,
                                '');
                            result.metadata[key] = value;
                        }
                    });
                }
                return result;
            }

            _getAdjacentPosts(slug) {
                const index = this.postsIndex.findIndex(p => p.slug === slug);
                return {
                    prevPost: index > 0 ? this.postsIndex[index - 1] : null,
                    nextPost: index < this.postsIndex.length - 1 ? this.postsIndex[index + 1] : null
                };
            }

            getTaxonomyData() {
                return {
                    categories: Object.keys(this.categories).map(name => ({ name, count: this.categories[name]
                            .length })),
                    tags: Object.keys(this.tags).map(name => ({ name, count: this.tags[name].length })),
                    archives: Object.keys(this.archives).map(name => ({ name, count: this.archives[name]
                            .length })),
                    totalPosts: this.postsIndex.length
                };
            }

            clearCache() {
                this.postsCache.clear();
                this.isInitialized = false;
            }
        }

        // ==================== 应用主逻辑 ====================
        (function() {
            const blog = new BlogKernel({
                onError: (msg, err) => {
                    console.warn('[BlogKernel]', msg, err);
                    showToast('加载出错，请检查文件结构是否正确');
                }
            });

            // DOM引用
            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);

            const searchWrap = $('#searchWrap');
            const searchInput = $('#searchInput');
            const searchClear = $('#searchClear');
            const mobileSearchBtn = $('#mobileSearchBtn');
            const themeToggle = $('#themeToggle');
            const mobileMenuBtn = $('#mobileMenuBtn');
            const sidebar = $('#sidebar');
            const sidebarOverlay = $('#sidebarOverlay');
            const contentBody = $('#contentBody');
            const contentTitle = $('#contentTitle');
            const resultCount = $('#resultCount');
            const pagination = $('#pagination');
            const loadingSkeleton = $('#loadingSkeleton');
            const backToTop = $('#backToTop');
            const siteHeader = $('#siteHeader');
            const sidebarCategories = $('#sidebarCategories');
            const sidebarTags = $('#sidebarTags');
            const sidebarArchives = $('#sidebarArchives');
            const sidebarReset = $('#sidebarReset');
            const toastContainer = $('#toastContainer');

            let currentState = {
                view: 'list',
                category: null,
                tag: null,
                archive: null,
                keyword: '',
                page: 1,
                slug: null,
                perPage: 5
            };

            let taxonomyData = null;
            let searchDebounceTimer = null;

            // ============ 主题管理 ============
            function getSavedTheme() {
                try {
                    return localStorage.getItem('blog-theme');
                } catch (e) { return null; }
            }

            function saveTheme(theme) {
                try {
                    localStorage.setItem('blog-theme', theme);
                } catch (e) {}
            }

            function applyTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                saveTheme(theme);
            }

            function toggleTheme() {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                applyTheme(next);
            }

            function initTheme() {
                const saved = getSavedTheme();
                if (saved) {
                    applyTheme(saved);
                } else {
                    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    applyTheme(prefersDark ? 'dark' : 'light');
                }
            }

            // ============ Toast ============
            function showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                toastContainer.appendChild(toast);
                toast.addEventListener('animationend', (e) => {
                    if (e.animationName === 'toastOut') toast.remove();
                });
            }

            // ============ 侧边栏渲染 ============
            function renderSidebar() {
                if (!taxonomyData) return;
                // 分类
                sidebarCategories.innerHTML = taxonomyData.categories.map(c =>
                    `<div class="sidebar-cat-item${currentState.category===c.name?' active':''}" data-category="${escapeAttr(c.name)}">${escapeHTML(c.name)}<span class="count">${c.count}</span></div>`
                ).join('') || '<span style="font-size:0.8rem;color:var(--text-muted);">暂无分类</span>';

                // 标签
                sidebarTags.innerHTML = taxonomyData.tags.map(t =>
                    `<span class="sidebar-tag${currentState.tag===t.name?' active':''}" data-tag="${escapeAttr(t.name)}">${escapeHTML(t.name)}<span class="count">${t.count}</span></span>`
                ).join('') || '<span style="font-size:0.8rem;color:var(--text-muted);">暂无标签</span>';

                // 归档
                sidebarArchives.innerHTML = taxonomyData.archives.map(a =>
                    `<span class="sidebar-archive-item${currentState.archive===a.name?' active':''}" data-archive="${escapeAttr(a.name)}">${escapeHTML(a.name)}<span class="count">${a.count}</span></span>`
                ).join('') || '<span style="font-size:0.8rem;color:var(--text-muted);">暂无归档</span>';
            }

            function updateSidebarActive() {
                $$('.sidebar-cat-item').forEach(el => {
                    el.classList.toggle('active', el.dataset.category === (currentState.category || ''));
                });
                $$('.sidebar-tag').forEach(el => {
                    el.classList.toggle('active', el.dataset.tag === (currentState.tag || ''));
                });
                $$('.sidebar-archive-item').forEach(el => {
                    el.classList.toggle('active', el.dataset.archive === (currentState.archive || ''));
                });
            }

            // ============ 格式化 ============
            function formatDate(dateStr) {
                if (!dateStr) return '';
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return dateStr;
                return d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
            }

            function escapeHTML(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function escapeAttr(str) {
                return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g,
                    '&gt;');
            }

            // ============ 文章列表渲染 ============
            async function renderPostList() {
                contentBody.innerHTML = '';
                pagination.innerHTML = '';
                loadingSkeleton.style.display = 'flex';
                contentTitle.textContent = getContentTitle();
                resultCount.textContent = '';

                try {
                    const queryResult = blog.queryPosts({
                        category: currentState.category,
                        tag: currentState.tag,
                        archive: currentState.archive,
                        keyword: currentState.keyword,
                        page: currentState.page,
                        perPage: currentState.perPage
                    });

                    resultCount.textContent = `共 ${queryResult.pagination.totalItems} 篇文章`;
                    loadingSkeleton.style.display = 'none';

                    if (queryResult.items.length === 0) {
                        contentBody.innerHTML = `
                        <div class="empty-state">
                          <div class="empty-icon">~</div>
                          <h3>这里还没有文章</h3>
                          <p>${currentState.keyword ? '没有找到匹配的文章，请尝试其他关键词' : '请检查 posts/ 目录下的文件'}</p>
                        </div>`;
                        return;
                    }

                    // 并行加载当前页文章详情以获取封面图
                    const detailPromises = queryResult.items.map(item =>
                        blog.getPostDetail(item.slug).catch(() => null)
                    );
                    const details = await Promise.all(detailPromises);

                    const cardsHTML = queryResult.items.map((item, i) => {
                        const detail = details[i];
                        const coverImg = detail?.coverImage || null;
                        const summary = detail?.content ?
                            detail.content.replace(/[#*`!\>\n\r\[\]\(\)-]/g, '').replace(/\s+/g, ' ')
                            .trim().slice(0, 150) + '...' :
                            (item.summary || '');
                        const readingTime = detail?.readingTime || null;
                        const isSticky = item.sticky;

                        const coverHTML = coverImg ?
                            `<img src="${escapeAttr(coverImg)}" alt="${escapeAttr(item.title)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-cover-placeholder\\'>' + (this.parentElement.parentElement.querySelector('.card-title')?.textContent?.charAt(0) || '?') + '</div>';">` :
                            `<div class="card-cover-placeholder">${escapeHTML(item.title?.charAt(0) || '?')}</div>`;

                        return `
                        <article class="post-card${isSticky?' sticky-post':''}" data-slug="${escapeAttr(item.slug)}" role="link" tabindex="0" aria-label="阅读：${escapeAttr(item.title)}">
                          <div class="card-cover">${coverHTML}</div>
                          <div class="card-body">
                            <div class="card-meta-top">
                              ${isSticky ? '<span class="card-sticky-badge">置顶</span>' : ''}
                              ${item.category ? `<span class="card-category">${escapeHTML(item.category)}</span>` : ''}
                              <span>${formatDate(item.date)}</span>
                            </div>
                            <h2 class="card-title">${escapeHTML(item.title)}</h2>
                            ${summary ? `<p class="card-summary">${escapeHTML(summary)}</p>` : ''}
                            <div class="card-tags-row">
                              ${(item.tags||[]).map(t=>`<span class="card-tag">${escapeHTML(t)}</span>`).join('')}
                            </div>
                            <div class="card-footer-info">
                              ${readingTime ? `<span>约${readingTime}分钟阅读</span>` : ''}
                              ${readingTime ? '<span class="reading-time-dot"></span>' : ''}
                              <span>${formatDate(item.date)}</span>
                            </div>
                          </div>
                        </article>`;
                    }).join('');

                    contentBody.innerHTML = `<div class="posts-list">${cardsHTML}</div>`;

                    // 绑定卡片点击
                    $$('.post-card').forEach(card => {
                        card.addEventListener('click', () => {
                            const slug = card.dataset.slug;
                            if (slug) navigateToPost(slug);
                        });
                        card.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter' || e.key === ' ') {
                                e.preventDefault();
                                const slug = card.dataset.slug;
                                if (slug) navigateToPost(slug);
                            }
                        });
                    });

                    // 渲染分页
                    renderPagination(queryResult.pagination);

                } catch (err) {
                    loadingSkeleton.style.display = 'none';
                    contentBody.innerHTML = `
                    <div class="empty-state">
                      <div class="empty-icon">!</div>
                      <h3>加载失败</h3>
                      <p>请确保已按文件结构创建 config.json、posts/manifest.json 及文章 .md 文件</p>
                    </div>`;
                    console.error('渲染列表失败:', err);
                }
            }

            function getContentTitle() {
                if (currentState.keyword) return `搜索: "${currentState.keyword}"`;
                if (currentState.category) return `分类: ${currentState.category}`;
                if (currentState.tag) return `标签: ${currentState.tag}`;
                if (currentState.archive) return `归档: ${currentState.archive}`;
                return '最新文章';
            }

            function renderPagination(pg) {
                if (pg.totalPages <= 1) {
                    pagination.innerHTML = '';
                    return;
                }
                let html = '';
                html +=
                    `<button class="page-btn" ${pg.hasPrev?'':'disabled'} data-page="${pg.currentPage-1}" aria-label="上一页">&lsaquo;</button>`;

                const maxVisible = 5;
                let startPage = Math.max(1, pg.currentPage - Math.floor(maxVisible / 2));
                let endPage = Math.min(pg.totalPages, startPage + maxVisible - 1);
                if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);

                if (startPage > 1) {
                    html += `<button class="page-btn" data-page="1">1</button>`;
                    if (startPage > 2) html += `<span class="page-ellipsis">&hellip;</span>`;
                }
                for (let i = startPage; i <= endPage; i++) {
                    html +=
                        `<button class="page-btn${i===pg.currentPage?' active':''}" data-page="${i}"${i===pg.currentPage?' disabled':''}>${i}</button>`;
                }
                if (endPage < pg.totalPages) {
                    if (endPage < pg.totalPages - 1) html += `<span class="page-ellipsis">&hellip;</span>`;
                    html += `<button class="page-btn" data-page="${pg.totalPages}">${pg.totalPages}</button>`;
                }
                html +=
                    `<button class="page-btn" ${pg.hasNext?'':'disabled'} data-page="${pg.currentPage+1}" aria-label="下一页">&rsaquo;</button>`;
                pagination.innerHTML = html;

                $$('.page-btn:not(.active)').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const p = parseInt(btn.dataset.page);
                        if (!isNaN(p) && p !== currentState.page) {
                            currentState.page = p;
                            currentState.view = 'list';
                            currentState.slug = null;
                            updateHashForList();
                            renderPostList();
                            updateSidebarActive();
                            contentBody.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    });
                });
            }

            // ============ 文章详情渲染 ============
            async function renderPostDetail(slug) {
                contentBody.innerHTML = '';
                pagination.innerHTML = '';
                loadingSkeleton.style.display = 'flex';
                contentTitle.textContent = '文章详情';
                resultCount.textContent = '';
                currentState.view = 'detail';
                currentState.slug = slug;

                try {
                    const post = await blog.getPostDetail(slug);
                    loadingSkeleton.style.display = 'none';
                    document.title = `${escapeHTML(post.title)} - 猫猫的回忆`;

                    const coverHTML = post.coverImage ?
                        `<img src="${escapeAttr(post.coverImage)}" alt="${escapeAttr(post.title)}" class="article-cover-full" onerror="this.style.display='none';">` :
                        '';

                    const tagsHTML = (post.tags && post.tags.length) ?
                        post.tags.map(t =>
                            `<span class="card-tag" style="cursor:pointer;" data-tag-nav="${escapeAttr(t)}">${escapeHTML(t)}</span>`
                            ).join('') :
                        '';

                    const renderedContent = marked.parse(post.content || '');

                    const prevNav = post.prevPost ?
                        `<div class="article-nav-item prev" data-nav-slug="${escapeAttr(post.prevPost.slug)}">
                    <div class="article-nav-label">上一篇</div>
                    <div class="article-nav-title">${escapeHTML(post.prevPost.title)}</div>
                  </div>` :
                        `<div class="article-nav-item prev empty"><div class="article-nav-label">上一篇</div><div class="article-nav-title">没有更早的文章了</div></div>`;

                    const nextNav = post.nextPost ?
                        `<div class="article-nav-item next" data-nav-slug="${escapeAttr(post.nextPost.slug)}">
                    <div class="article-nav-label">下一篇</div>
                    <div class="article-nav-title">${escapeHTML(post.nextPost.title)}</div>
                  </div>` :
                        `<div class="article-nav-item next empty"><div class="article-nav-label">下一篇</div><div class="article-nav-title">已经是最新文章了</div></div>`;

                    contentBody.innerHTML = `
                  <div class="article-view">
                    <button class="article-back" id="articleBackBtn">
                      <span class="article-back-arrow">&larr;</span> 返回文章列表
                    </button>
                    ${coverHTML}
                    <h1 class="article-title">${escapeHTML(post.title)}</h1>
                    <div class="article-meta">
                      <span>${formatDate(post.date)}</span>
                      <span class="meta-sep"></span>
                      ${post.category?`<span class="card-category" style="cursor:pointer;" data-cat-nav="${escapeAttr(post.category)}">${escapeHTML(post.category)}</span><span class="meta-sep"></span>`:''}
                      <span>约${post.readingTime}分钟阅读</span>
                      <span class="meta-sep"></span>
                      <span>${post.wordCount} 字</span>
                      ${tagsHTML ? `<span class="meta-sep"></span>`+tagsHTML : ''}
                      ${post.sticky ? '<span class="card-sticky-badge">置顶</span>' : ''}
                    </div>
                    <div class="article-content">${renderedContent}</div>
                    <div class="article-nav">${prevNav}${nextNav}</div>
                  </div>`;

                    // 绑定返回按钮
                    const backBtn = $('#articleBackBtn');
                    if (backBtn) {
                        backBtn.addEventListener('click', () => {
                            navigateToList();
                        });
                    }

                    // 绑定文章内标签点击
                    $$('[data-tag-nav]').forEach(el => {
                        el.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const tag = el.dataset.tagNav;
                            currentState = { view: 'list', category: null, tag: tag,
                                archive: null, keyword: '', page: 1, slug: null, perPage: 5 };
                            updateHashForList();
                            refreshAll();
                        });
                    });

                    // 绑定分类点击
                    $$('[data-cat-nav]').forEach(el => {
                        el.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const cat = el.dataset.catNav;
                            currentState = { view: 'list', category: cat, tag: null,
                                archive: null, keyword: '', page: 1, slug: null, perPage: 5 };
                            updateHashForList();
                            refreshAll();
                        });
                    });

                    // 绑定上下篇导航
                    $$('.article-nav-item[data-nav-slug]').forEach(el => {
                        el.addEventListener('click', () => {
                            const navSlug = el.dataset.navSlug;
                            if (navSlug) navigateToPost(navSlug);
                        });
                    });

                    contentBody.scrollIntoView({ behavior: 'smooth', block: 'start' });

                } catch (err) {
                    loadingSkeleton.style.display = 'none';
                    contentBody.innerHTML = `
                  <div class="empty-state">
                    <div class="empty-icon">?</div>
                    <h3>文章加载失败</h3>
                    <p>无法找到文章 "${escapeHTML(slug)}"，请检查文件是否存在</p>
                    <button class="sidebar-reset" style="margin-top:1rem;cursor:pointer;" onclick="window.location.hash='#/';">返回首页</button>
                  </div>`;
                    console.error('渲染详情失败:', err);
                }
            }

            // ============ 导航 ============
            function navigateToPost(slug) {
                currentState.view = 'detail';
                currentState.slug = slug;
                updateHashForDetail(slug);
                renderPostDetail(slug);
                closeMobileSidebar();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function navigateToList() {
                currentState.view = 'list';
                currentState.slug = null;
                updateHashForList();
                refreshAll();
                contentBody.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            function updateHashForList() {
                const parts = [];
                if (currentState.category) parts.push('category=' + encodeURIComponent(currentState.category));
                if (currentState.tag) parts.push('tag=' + encodeURIComponent(currentState.tag));
                if (currentState.archive) parts.push('archive=' + encodeURIComponent(currentState.archive));
                if (currentState.keyword) parts.push('search=' + encodeURIComponent(currentState.keyword));
                if (currentState.page > 1) parts.push('page=' + currentState.page);
                const hash = parts.length > 0 ? '#/list?' + parts.join('&') : '#/';
                if (window.location.hash !== hash) {
                    history.pushState(null, '', hash);
                }
            }

            function updateHashForDetail(slug) {
                const hash = '#/post/' + encodeURIComponent(slug);
                if (window.location.hash !== hash) {
                    history.pushState(null, '', hash);
                }
            }

            function parseHash() {
                const hash = window.location.hash.replace(/^#/, '');
                if (!hash || hash === '/' || hash === '/list') {
                    currentState.view = 'list';
                    currentState.slug = null;
                    currentState.category = null;
                    currentState.tag = null;
                    currentState.archive = null;
                    currentState.keyword = '';
                    currentState.page = 1;
                    return;
                }
                if (hash.startsWith('/post/')) {
                    const slug = decodeURIComponent(hash.replace('/post/', '').split('?')[0]);
                    currentState.view = 'detail';
                    currentState.slug = slug;
                    return;
                }
                if (hash.startsWith('/list?')) {
                    const qs = hash.replace('/list?', '');
                    const params = new URLSearchParams(qs);
                    currentState.view = 'list';
                    currentState.slug = null;
                    currentState.category = params.get('category') || null;
                    currentState.tag = params.get('tag') || null;
                    currentState.archive = params.get('archive') || null;
                    currentState.keyword = params.get('search') || '';
                    currentState.page = parseInt(params.get('page')) || 1;
                    return;
                }
                // 默认
                currentState.view = 'list';
                currentState.slug = null;
                currentState.category = null;
                currentState.tag = null;
                currentState.archive = null;
                currentState.keyword = '';
                currentState.page = 1;
            }

            // ============ 刷新全部 ============
            function refreshAll() {
                searchInput.value = currentState.keyword || '';
                if (currentState.keyword) {
                    searchClear.classList.add('visible');
                } else {
                    searchClear.classList.remove('visible');
                }
                updateSidebarActive();
                if (currentState.view === 'detail' && currentState.slug) {
                    renderPostDetail(currentState.slug);
                } else {
                    document.title = '猫猫和主人的回忆';
                    renderPostList();
                }
            }

            // ============ 事件处理 ============
            function handleSearchInput() {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => {
                    const val = searchInput.value.trim();
                    currentState.keyword = val;
                    currentState.page = 1;
                    currentState.view = 'list';
                    currentState.slug = null;
                    currentState.category = null;
                    currentState.tag = null;
                    currentState.archive = null;
                    updateHashForList();
                    refreshAll();
                    if (val) {
                        searchClear.classList.add('visible');
                    } else {
                        searchClear.classList.remove('visible');
                    }
                }, 350);
            }

            function handleSearchClear() {
                searchInput.value = '';
                currentState.keyword = '';
                currentState.page = 1;
                currentState.view = 'list';
                currentState.slug = null;
                currentState.category = null;
                currentState.tag = null;
                currentState.archive = null;
                searchClear.classList.remove('visible');
                updateHashForList();
                refreshAll();
                searchInput.focus();
            }

            function closeMobileSidebar() {
                sidebar.classList.remove('mobile-open');
                sidebarOverlay.classList.remove('active');
                mobileMenuBtn.classList.remove('active');
            }

            function openMobileSidebar() {
                sidebar.classList.add('mobile-open');
                sidebarOverlay.classList.add('active');
                mobileMenuBtn.classList.add('active');
            }

            function toggleMobileSidebar() {
                if (sidebar.classList.contains('mobile-open')) {
                    closeMobileSidebar();
                } else {
                    openMobileSidebar();
                }
            }

            function toggleMobileSearch() {
                searchWrap.classList.toggle('mobile-visible');
                if (searchWrap.classList.contains('mobile-visible')) {
                    searchInput.focus();
                }
            }

            // ============ 事件绑定 ============
            searchInput.addEventListener('input', handleSearchInput);
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    handleSearchClear();
                    searchInput.blur();
                }
            });
            searchClear.addEventListener('click', handleSearchClear);
            mobileSearchBtn.addEventListener('click', toggleMobileSearch);
            themeToggle.addEventListener('click', toggleTheme);
            mobileMenuBtn.addEventListener('click', toggleMobileSidebar);
            sidebarOverlay.addEventListener('click', closeMobileSidebar);

            sidebarCategories.addEventListener('click', (e) => {
                const item = e.target.closest('.sidebar-cat-item');
                if (!item) return;
                const cat = item.dataset.category;
                if (currentState.category === cat) {
                    currentState.category = null;
                } else {
                    currentState.category = cat;
                }
                currentState.tag = null;
                currentState.archive = null;
                currentState.keyword = '';
                currentState.page = 1;
                currentState.view = 'list';
                currentState.slug = null;
                searchInput.value = '';
                searchClear.classList.remove('visible');
                updateHashForList();
                refreshAll();
                closeMobileSidebar();
            });

            sidebarTags.addEventListener('click', (e) => {
                const item = e.target.closest('.sidebar-tag');
                if (!item) return;
                const tag = item.dataset.tag;
                if (currentState.tag === tag) {
                    currentState.tag = null;
                } else {
                    currentState.tag = tag;
                }
                currentState.category = null;
                currentState.archive = null;
                currentState.keyword = '';
                currentState.page = 1;
                currentState.view = 'list';
                currentState.slug = null;
                searchInput.value = '';
                searchClear.classList.remove('visible');
                updateHashForList();
                refreshAll();
                closeMobileSidebar();
            });

            sidebarArchives.addEventListener('click', (e) => {
                const item = e.target.closest('.sidebar-archive-item');
                if (!item) return;
                const archive = item.dataset.archive;
                if (currentState.archive === archive) {
                    currentState.archive = null;
                } else {
                    currentState.archive = archive;
                }
                currentState.category = null;
                currentState.tag = null;
                currentState.keyword = '';
                currentState.page = 1;
                currentState.view = 'list';
                currentState.slug = null;
                searchInput.value = '';
                searchClear.classList.remove('visible');
                updateHashForList();
                refreshAll();
                closeMobileSidebar();
            });

            sidebarReset.addEventListener('click', () => {
                currentState = { view: 'list', category: null, tag: null, archive: null, keyword: '', page: 1,
                    slug: null, perPage: 5 };
                searchInput.value = '';
                searchClear.classList.remove('visible');
                updateHashForList();
                refreshAll();
                closeMobileSidebar();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // 博客名点击返回首页
            document.querySelector('.blog-name').addEventListener('click', (e) => {
                e.preventDefault();
                currentState = { view: 'list', category: null, tag: null, archive: null, keyword: '', page: 1,
                    slug: null, perPage: 5 };
                searchInput.value = '';
                searchClear.classList.remove('visible');
                updateHashForList();
                refreshAll();
                closeMobileSidebar();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // 浏览器后退/前进
            window.addEventListener('popstate', () => {
                parseHash();
                refreshAll();
                if (currentState.view === 'detail') {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            // 回到顶部
            function handleBackToTop() {
                if (window.scrollY > 500) {
                    backToTop.classList.add('visible');
                } else {
                    backToTop.classList.remove('visible');
                }
            }
            window.addEventListener('scroll', handleBackToTop, { passive: true });
            backToTop.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // Header阴影
            function handleHeaderShadow() {
                if (window.scrollY > 10) {
                    siteHeader.classList.add('scrolled');
                } else {
                    siteHeader.classList.remove('scrolled');
                }
            }
            window.addEventListener('scroll', handleHeaderShadow, { passive: true });

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    searchInput.focus();
                    if (window.innerWidth <= 768 && !searchWrap.classList.contains('mobile-visible')) {
                        toggleMobileSearch();
                    }
                }
                if (e.key === 'Escape' && currentState.view === 'detail') {
                    navigateToList();
                }
            });

            // 关闭移动搜索当点击外部
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 &&
                    searchWrap.classList.contains('mobile-visible') &&
                    !searchWrap.contains(e.target) &&
                    e.target !== mobileSearchBtn &&
                    !mobileSearchBtn.contains(e.target)) {
                    searchWrap.classList.remove('mobile-visible');
                }
            });

            // ============ 初始化 ============
            async function initApp() {
                initTheme();
                parseHash();

                try {
                    await blog.init();
                    taxonomyData = blog.getTaxonomyData();
                    renderSidebar();
                    updateSidebarActive();

                    if (currentState.view === 'detail' && currentState.slug) {
                        await renderPostDetail(currentState.slug);
                    } else {
                        if (currentState.keyword) searchInput.value = currentState.keyword;
                        if (currentState.keyword) searchClear.classList.add('visible');
                        await renderPostList();
                    }
                } catch (err) {
                    loadingSkeleton.style.display = 'none';
                    contentBody.innerHTML = `
                    <div class="empty-state">
                      <div class="empty-icon">~</div>
                      <h3>内核初始化失败</h3>
                      <p>请确保在仓库根目录存在 config.json 和 posts/manifest.json 文件</p>
                      <p style="font-size:0.8rem;margin-top:0.5rem;">参考项目文件结构创建这些文件后刷新页面</p>
                    </div>`;
                    console.error('初始化失败:', err);
                }
            }

            // 启动应用
            initApp();

            // 暴露API到全局
            window.__blogKernel = blog;
            window.__blogApp = {
                refreshAll,
                navigateToPost,
                navigateToList,
                toggleTheme,
                getState: () => currentState,
                getTaxonomyData: () => taxonomyData,
            };

            console.log('%c🐱 猫猫和主人的回忆 %cBlogKernel 已就绪',
                'font-size:1.1em;color:#d4946a;', 'font-size:0.9em;color:#888;');
            console.log('%c内核API可通过 window.__blogKernel 和 window.__blogApp 访问',
                'font-size:0.75em;color:#aaa;');
        })();
    </script>
</body>
</html>
